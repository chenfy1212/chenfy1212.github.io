backend:
  name: github
  repo: chenfy1212/chenfy1212.github.io
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "content"
    label: "网站内容"
    files:
      - label: "网站数据"
        name: "site_content"
        file: "content.js"
        fields:
          - label: "提示"
            name: "note"
            widget: "hidden"
            default: "当前阶段先测试后台能否打开，下一步再改成可视化案例表单。"
